<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reformed Dev Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- CLOCK -->
  <div class="clock" id="clock"></div>

  <!-- SEARCH BAR -->
  <div class="search-wrapper">
    <input id="search" placeholder="Search the web..." autofocus />
  </div>

  <!-- QUICK LINKS -->
  <div class="links">
    
      <a href="https://enonbaptistchurch.github.io" target="_blank">
        <i class="fa-brands fa-github"></i> Enon Tools
      </a>
      <a href="https://github.com" target="_blank">
        <i class="fa-brands fa-github"></i> GitHub
      </a>

      <a href="https://gmail.com" target="_blank">
        <i class="fa-solid fa-envelope"></i> Email
      </a>
      <a href="https://calendar.google.com" target="_blank">
        <i class="fa-solid fa-calendar"></i> Calendar
      </a>
  </div>

  <!-- DASHBOARD FEEDS -->
  <div class="dashboard">
    <h2>Christian Feeds</h2>
    <div id="all-feeds" class="card-grid"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
